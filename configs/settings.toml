# TravelMovieAI local configuration.
# Paths may be relative to the repository root or absolute Windows paths.

workspace = "workspace"
database_filename = "project.db"

ffmpeg_binary = "ffmpeg"
ffprobe_binary = "ffprobe"
frame_extraction_timeout_seconds = 120
render_timeout_seconds = 7200

vision_provider = "local"
vision_model = "auto"
model_cache = "models"
allow_model_download = true
device = "auto"

# "auto" detects CPU, RAM, GPU, CUDA, NVENC, and free VRAM. It selects the
# fastest suitable profile while preserving memory for Windows and the driver.
resource_mode = "auto" # auto | safe | balanced | performance
gpu_memory_reserve_mb = 1536
max_gpu_processes = 2

music_library = "assets/music"
music_model = "auto"
generated_music_filename = "generated_soundtrack.wav"

whisper_model = "medium"

# 0 enables automatic hardware-based selection.
batch_size = 0
workers = 0

web_host = "127.0.0.1"
web_port = 8000
web_history_limit = 100
